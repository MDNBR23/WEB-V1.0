<!doctype html><html lang="es" data-theme="light"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configuración — NBR WEB</title>
<link rel="stylesheet" href="style.css">
<script>
  document.documentElement.classList.add('preload');
  window.addEventListener('DOMContentLoaded', function(){
    document.body.classList.add('loaded');
    document.documentElement.classList.remove('preload');
  });
</script>
</head><body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><span class="logo-full">NBR WEB</span><span class="logo-short">NBR</span></div>
      <nav>
        <a href="main.html"><span class="icon">🏠</span><span>Principal</span></a>
        <a href="calculadora.html"><span class="icon">💊</span><span>Banco de medicamentos</span></a>
        <a href="configuracion.html" class="active"><span class="icon">⚙️</span><span>Configuración</span></a>
        <a href="admin.html"><span class="icon">🛠️</span><span>Administración</span></a>
      </nav>
    </aside>
    <div class="content">
      <header class="header">
        <button id="btnToggleSidebar" type="button"></button>
        <h2>Configuración</h2>
        <div class="user-info">
          <img id="avatarTop" alt="">
          <span id="mainUserInfo" class="text-muted"></span>
          <button class="btn danger sm" type="button" onclick="logout()">Salir</button>
        </div>
      </header>
      <main>
        <section class="card glass">
          <h3>Perfil</h3>
          <form id="cfgForm">
            <div class="grid-2col" style="grid-template-columns:320px 1fr;">
              <div>
                <div class="field"><label>Imagen de Perfil</label><img id="avatarTopPreview" src="" alt="" style="width:140px;height:140px;border-radius:16px;border:1px solid var(--border);object-fit:cover;background:linear-gradient(135deg,var(--g1),var(--g2));"></div>
                <div class="field" style="display:flex;gap:8px;flex-direction:column;">
                  <button class="btn sm" type="button" onclick="document.getElementById('cfgAvatarFile').click()">Añadir imagen de perfil</button>
                  <button class="btn secondary sm" type="button" id="cfgAvatarClear">Quitar imagen de perfil</button>
                  <input id="cfgAvatarFile" type="file" accept="image/*" style="display:none;">
                </div>
              </div>
              <div>
                <div class="field"><label>Usuario</label><input id="cfgUser" type="text" disabled></div>
                <div class="field"><label>Nombre mostrado</label><input id="cfgName" type="text"></div>
                <div class="field"><label>Categoría</label>
                  <select id="cfgCat"><option value="">(sin especificar)</option><option>Estudiante</option><option>Interno</option><option>Médico General</option><option>Residente</option><option>Pediatra</option></select>
                </div>
                <div class="field"><label>Correo</label><input id="cfgMail" type="email"></div>
                <div class="field"><label>Teléfono</label><input id="cfgPhone" type="text"></div>
                <div class="field"><label>Institución</label><input id="cfgInst" type="text"></div>
              </div>
            </div>
            <div class="auth-actions" style="margin-top:14px">
              <button class="btn grow" type="submit">Guardar cambios</button>
              <label class="switch" title="Modo oscuro" style="margin-left:auto">
                <input class="theme-toggle" type="checkbox"><span class="slider"></span><span class="label">Oscuro</span>
              </label>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body></html>
